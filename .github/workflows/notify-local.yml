name: Notify local keiba shobu races

on:
  workflow_dispatch:
  schedule:
    # UTC基準。JST 10:00〜21:50ごろまで10分おき
    - cron: "*/10 1-12 * * *"

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tzdata

      - name: Run local race notifier
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python notify_local.py --places 36,44,50 --races 10,11,12 --budget 3000 --dry-run